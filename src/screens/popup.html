<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #1a1a1a;
      color: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      color: #ffffff;
      margin: 0;
    }

    .settings-btn {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888888;
      transition: color 0.2s, background-color 0.2s;
    }

    .settings-btn:hover {
      color: #ffffff;
      background-color: #2d2d2d;
    }

    .settings-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px;
      background: #2d2d2d;
      border-radius: 8px;
      margin-bottom: 15px;
      border: 1px solid #404040;
    }

    .status-text {
      font-weight: 500;
    }

    .status.enabled {
      background: #1a3d1a;
      color: #90ee90;
      border-color: #28a745;
    }

    .status.disabled {
      background: #3d1a1a;
      color: #ffb3b3;
      border-color: #dc3545;
    }

    .toggle-btn {
      background: #007cff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      transition: background-color 0.2s;
    }

    .toggle-btn:hover {
      background: #0056cc;
    }

    .toggle-btn.disabled {
      background: #dc3545;
    }

    .toggle-btn.disabled:hover {
      background: #c82333;
    }

    .delete-all-btn {
      background: #000000;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      margin-top: 10px;
      transition: background-color 0.2s;
    }

    .delete-all-btn:hover {
      background: #333333;
    }

    .delete-all-btn:disabled {
      background: #404040;
      cursor: not-allowed;
    }

    .confirmation-dialog {
      background: #2d2d2d;
      border: 2px solid #dc3545;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
      display: none;
    }

    .confirmation-dialog.show {
      display: block;
    }

    .confirmation-text {
      color: #ffb3b3;
      font-weight: 500;
      margin-bottom: 10px;
      text-align: center;
    }

    .confirmation-buttons {
      display: flex;
      gap: 10px;
    }

    .confirm-btn,
    .cancel-btn {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .confirm-btn {
      background: #dc3545;
      color: white;
    }

    .confirm-btn:hover {
      background: #c82333;
    }

    .cancel-btn {
      background: #404040;
      color: white;
    }

    .cancel-btn:hover {
      background: #505050;
    }

    .warning {
      background: #3d3d1a;
      color: #ffeb3b;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 15px;
      border-left: 4px solid #ffc107;
    }

    .indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-left: 10px;
    }

    .indicator.enabled {
      background: #28a745;
    }

    .indicator.disabled {
      background: #dc3545;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1 class="title" data-i18n="extensionTitle">History Auto-Delete</h1>
    <button id="settingsBtn" class="settings-btn" data-i18n-title="popupSettingsTitle" data-i18n-aria="popupSettingsAriaLabel" title="Settings" aria-label="Open settings">
      <!-- gear / cog SVG -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54a.48.48 0 0 0-.48-.41h-3.84a.48.48 0 0 0-.47.41l-.36 2.54a7.02 7.02 0 0 0-1.62.94l-2.39-.96a.48.48 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94L2.86 14.52a.47.47 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.06.24.28.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.58-.27 1.12-.58 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.03-1.58zM12 15.6A3.6 3.6 0 0 1 8.4 12 3.6 3.6 0 0 1 12 8.4 3.6 3.6 0 0 1 15.6 12 3.6 3.6 0 0 1 12 15.6z"/>
      </svg>
    </button>
  </div>

  <div id="status" class="status">
    <span class="status-text"><span data-i18n="statusLabel">Status:</span> <span id="statusText"
        data-i18n="statusLoading">Loading...</span></span>
    <div id="indicator" class="indicator"></div>
  </div>

  <button id="toggleBtn" class="toggle-btn" data-i18n="statusLoading">Loading...</button>

  <button id="deleteAllBtn" class="delete-all-btn" data-i18n="buttonDeleteAll">Delete All History</button>

  <div id="confirmationDialog" class="confirmation-dialog">
    <div class="confirmation-text" data-i18n="confirmationText">Are you sure you want to delete ALL browsing history?
    </div>
    <div class="confirmation-buttons">
      <button id="confirmBtn" class="confirm-btn" data-i18n="confirmButtonDelete">Delete All</button>
      <button id="cancelBtn" class="cancel-btn" data-i18n="confirmButtonCancel">Cancel</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
